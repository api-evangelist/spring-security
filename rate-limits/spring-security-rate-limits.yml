specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Spring Security
providerId: spring-security
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Authentication
  - Authorization
  - Java
  - OAuth2
  - Spring Framework
  - Rate Limiting
description: Spring Security is a self-hosted authentication and authorization framework — there is no vendor-hosted API and therefore no vendor-imposed throughput limits. Spring Authorization Server (a Spring Security sub-project) ships token endpoints whose throughput is bounded only by the operator's deployment. Throttling is added by the surrounding gateway, Resilience4j, or a custom filter.
sources:
  - https://spring.io/projects/spring-security
  - https://docs.spring.io/spring-authorization-server/reference/
notes: No vendor-imposed rate limits. Spring Authorization Server's token, introspection, and userinfo endpoints inherit whatever throttling the operator configures upstream.
responseCodes:
  throttled: 429
limits:
  - name: Operator-Defined
    scope: deployment
    metric: varies
    limit: see operator deployment configuration
    notes: Spring Security and Spring Authorization Server emit no built-in throttling. Effective limits depend on the gateway, ingress, or filter chain in front of the OAuth2 endpoints.
policies:
  - name: Self-Hosted Throttling
    description: Operators commonly add a Servlet or WebFlux filter (often Resilience4j-backed) that emits 429 with Retry-After when the token endpoint is hammered. Spring Security itself does not enforce a request rate.
  - name: Lockout vs Throttle
    description: Spring Security distinguishes account-lockout policy (UserDetailsService / failed-login counter) from request-rate throttling. Lockout is per-principal; throttling is per-IP or per-key and lives in the surrounding stack.
maintainers:
  - name: VMware Tanzu / Broadcom
    url: https://tanzu.vmware.com/spring-runtime
