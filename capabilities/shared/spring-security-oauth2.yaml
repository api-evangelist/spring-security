naftiko: "1.0.0-alpha1"

info:
  label: "Spring Security OAuth2"
  description: "OAuth 2.0 and OpenID Connect endpoints for Spring Security applications including authorization, token issuance, introspection, JWKS, and discovery."
  tags:
    - Authentication
    - Authorization
    - JWT
    - OAuth2
    - OpenID Connect
    - Security
    - Spring
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SPRING_SECURITY_BASE_URL: SPRING_SECURITY_BASE_URL
      SPRING_SECURITY_CLIENT_ID: SPRING_SECURITY_CLIENT_ID
      SPRING_SECURITY_CLIENT_SECRET: SPRING_SECURITY_CLIENT_SECRET

capability:
  consumes:
    - type: http
      namespace: spring-security-oauth2
      baseUri: "{{env.SPRING_SECURITY_BASE_URL}}"
      description: "Spring Security OAuth2 protocol endpoints"
      authentication:
        type: basic
        username: "{{env.SPRING_SECURITY_CLIENT_ID}}"
        password: "{{env.SPRING_SECURITY_CLIENT_SECRET}}"
      resources:
        - name: token
          path: /oauth2/token
          description: "OAuth2 token issuance endpoint"
          operations:
            - name: issue-token
              method: POST
              description: "Issue access tokens for all supported grant types"
              inputParameters:
                - name: grant_type
                  in: body
                  type: string
                  required: true
                - name: code
                  in: body
                  type: string
                  required: false
                - name: refresh_token
                  in: body
                  type: string
                  required: false
                - name: scope
                  in: body
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: introspect
          path: /oauth2/introspect
          description: "Token introspection endpoint"
          operations:
            - name: introspect-token
              method: POST
              description: "Validate a token and return its metadata"
              inputParameters:
                - name: token
                  in: body
                  type: string
                  required: true
                - name: token_type_hint
                  in: body
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: revoke
          path: /oauth2/revoke
          description: "Token revocation endpoint"
          operations:
            - name: revoke-token
              method: POST
              description: "Revoke an access or refresh token"
              inputParameters:
                - name: token
                  in: body
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: jwks
          path: /oauth2/jwks
          description: "JSON Web Key Set endpoint"
          operations:
            - name: get-jwks
              method: GET
              description: "Retrieve public keys for JWT verification"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: userinfo
          path: /userinfo
          description: "OpenID Connect UserInfo endpoint"
          operations:
            - name: get-userinfo
              method: GET
              description: "Get claims about the authenticated user"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: discovery
          path: /.well-known/openid-configuration
          description: "OpenID Connect discovery endpoint"
          operations:
            - name: get-oidc-config
              method: GET
              description: "Get OpenID Connect provider configuration"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: spring-security-oauth2-api
      resources:
        - path: /v1/tokens
          name: tokens
          description: "OAuth2 token management"
          operations:
            - method: POST
              name: issue-token
              description: "Issue OAuth2 access token"
              call: "spring-security-oauth2.issue-token"
              with:
                grant_type: "rest.grant_type"
                code: "rest.code"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/tokens/introspect
          name: token-introspection
          description: "Token validation"
          operations:
            - method: POST
              name: introspect-token
              description: "Validate and get token metadata"
              call: "spring-security-oauth2.introspect-token"
              with:
                token: "rest.token"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/jwks
          name: jwks
          description: "Public signing keys"
          operations:
            - method: GET
              name: get-jwks
              description: "Get JWKS for token verification"
              call: "spring-security-oauth2.get-jwks"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: spring-security-oauth2-mcp
      transport: http
      tools:
        - name: issue-token
          description: "Issue an OAuth2 access token"
          hints:
            readOnly: false
            destructive: false
          call: "spring-security-oauth2.issue-token"
          with:
            grant_type: "tools.grant_type"
            code: "tools.code"
          outputParameters:
            - type: object
              mapping: "$."

        - name: introspect-token
          description: "Validate an OAuth2 token and retrieve its metadata"
          hints:
            readOnly: true
            openWorld: false
          call: "spring-security-oauth2.introspect-token"
          with:
            token: "tools.token"
          outputParameters:
            - type: object
              mapping: "$."

        - name: revoke-token
          description: "Revoke an OAuth2 access or refresh token"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "spring-security-oauth2.revoke-token"
          with:
            token: "tools.token"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-jwks
          description: "Retrieve the JWKS public keys for verifying JWT signatures"
          hints:
            readOnly: true
            openWorld: true
          call: "spring-security-oauth2.get-jwks"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-userinfo
          description: "Retrieve claims about the currently authenticated user via OpenID Connect"
          hints:
            readOnly: true
            openWorld: false
          call: "spring-security-oauth2.get-userinfo"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-oidc-config
          description: "Retrieve the OpenID Connect provider configuration for discovery"
          hints:
            readOnly: true
            openWorld: true
          call: "spring-security-oauth2.get-oidc-config"
          outputParameters:
            - type: object
              mapping: "$."
