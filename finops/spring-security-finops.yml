description: Spring Security is open-source self-hosted software with no vendor invoice. FinOps applies only to the cloud infrastructure that hosts the Authorization Server / resource servers and to optional VMware Tanzu Spring / Broadcom commercial support contracts.
sources:
  - https://spring.io/projects/spring-security
  - https://tanzu.vmware.com/spring-runtime
notes: No vendor usage meter. Real cost is the compute that runs the Authorization Server plus any Tanzu Spring support contract.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Broadcom (VMware Tanzu)
serviceCategory: Identity
billingModel:
  pricingCategory: Open Source
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Spring Security
  ServiceCategory: Identity
  ProviderName: Spring Security
  PublisherName: Broadcom
  InvoiceIssuerName: Broadcom
  BillingCurrency: USD
meters:
  - name: spring_runtime_subscription
    unit: month
    aggregation: sum
    dimensions:
      - contract_tier
      - cores
principles:
  - name: Visibility
    description: Spring Security emits Micrometer counters for authentication outcomes (success, failure, lockout) and OAuth2 token issuance; operators ship these to their SIEM and observability stack. Vendor cost is visible only on the Tanzu Spring invoice.
  - name: Allocation
    description: Authorization Server hosting cost is typically a shared platform-org line. Allocate downstream resource-server compute by the consuming product team via cloud provider tags.
  - name: Optimization
    description: Cost levers are infrastructure-side - cache JWKs, prefer JWT over opaque token introspection to avoid a round-trip per request, and right-size the token endpoint pods against measured login RPS.
  - name: Accountability
    description: Platform/security team owns the Authorization Server budget and any Tanzu Spring support contract; product teams own the cost of their resource servers.
maintainers:
  - name: VMware Tanzu / Broadcom
    url: https://tanzu.vmware.com/spring-runtime
