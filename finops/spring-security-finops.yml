specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Spring Security
providerId: spring-security
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Authentication
  - Authorization
  - Java
  - OAuth2
